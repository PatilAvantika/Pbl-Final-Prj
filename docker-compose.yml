services:
  postgres:
    image: postgres:16-alpine
    container_name: ngo-platform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ngo
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ngo']
      interval: 3s
      timeout: 5s
      retries: 10
